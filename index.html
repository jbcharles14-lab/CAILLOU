<style>
  :root{
    --chalk:#F7F5F0; --limestone:#EFEBE3; --ink:#17140F; --rock:#8B8377;
    --hair:#DAD3C7; --pine:#0E5B4A; --pine-2:#14795F; --pine-ghost:#0e5b4a1a;
    --shadow:0 6px 24px rgba(23,20,15,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--limestone);
    -webkit-font-smoothing:antialiased;overflow:hidden}
  #map{position:absolute;inset:0;background:var(--limestone)}

  /* top bar */
  header{position:absolute;top:0;left:0;right:0;z-index:900;
    padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;
    display:flex;align-items:center;gap:12px;pointer-events:none}
  .brand{pointer-events:auto;display:flex;align-items:center;gap:9px;
    background:var(--chalk);border:1px solid var(--hair);border-radius:14px;
    padding:8px 12px;box-shadow:var(--shadow)}
  .brand svg{display:block}
  .wordmark{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:.14em;
    font-size:16px;line-height:1}
  .count{font-family:'Space Mono',monospace;font-size:11px;color:var(--rock);
    line-height:1;margin-top:3px;letter-spacing:.02em}

  /* filter chips */
  .filters{position:absolute;left:0;right:0;z-index:900;
    top:calc(env(safe-area-inset-top) + 70px);
    display:flex;gap:8px;padding:0 14px;pointer-events:none;overflow-x:auto;scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{pointer-events:auto;flex:0 0 auto;font-family:'Space Grotesk',sans-serif;
    font-weight:500;font-size:13px;letter-spacing:.02em;
    padding:7px 14px;border-radius:999px;border:1px solid var(--hair);
    background:var(--chalk);color:var(--ink);cursor:pointer;box-shadow:var(--shadow);
    transition:background .15s,color .15s,border-color .15s}
  .chip[aria-pressed="true"]{background:var(--pine);color:var(--chalk);border-color:var(--pine)}
  .chip:focus-visible{outline:2px solid var(--pine);outline-offset:2px}

  /* markers */
  .mk{width:14px;height:14px;border-radius:50%;background:var(--pine);
    border:2px solid var(--chalk);box-shadow:0 1px 4px rgba(23,20,15,.35)}
  .mk.indoor{background:transparent;border:2px solid var(--rock);
    box-shadow:0 1px 3px rgba(23,20,15,.2)}
  .cluster{display:flex;align-items:center;justify-content:center;
    width:38px;height:38px;border-radius:50%;
    background:var(--pine);color:var(--chalk);border:2px solid var(--chalk);
    font-family:'Space Mono',monospace;font-weight:700;font-size:13px;
    box-shadow:0 3px 10px rgba(14,91,74,.4)}

  /* bottom sheet */
  .sheet{position:absolute;left:0;right:0;bottom:0;z-index:950;
    background:var(--chalk);border-top-left-radius:20px;border-top-right-radius:20px;
    border:1px solid var(--hair);border-bottom:0;box-shadow:0 -8px 30px rgba(23,20,15,.18);
    padding:8px 18px calc(env(safe-area-inset-bottom) + 20px);
    transform:translateY(115%);transition:transform .28s cubic-bezier(.22,1,.36,1)}
  .sheet.open{transform:translateY(0)}
  .grip{width:40px;height:4px;border-radius:2px;background:var(--hair);margin:6px auto 12px}
  .sheet h2{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;
    margin:0 0 8px;line-height:1.15}
  .tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .tag{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:500;
    letter-spacing:.06em;text-transform:uppercase;
    padding:4px 9px;border-radius:6px;background:var(--pine-ghost);color:var(--pine)}
  .tag.muted{background:#8b83771a;color:var(--rock)}
  .coord{font-family:'Space Mono',monospace;font-size:12px;color:var(--rock);
    margin:0 0 14px;letter-spacing:.02em}
  .actions{display:flex;gap:10px}
  .btn{flex:1;text-align:center;text-decoration:none;font-family:'Space Grotesk',sans-serif;
    font-weight:500;font-size:14px;padding:12px;border-radius:12px;
    border:1px solid var(--hair);color:var(--ink);background:var(--limestone)}
  .btn.primary{background:var(--pine);color:var(--chalk);border-color:var(--pine)}
  .btn:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
  .btn.hidden{display:none}

  /* leaflet chrome */
  .leaflet-control-attribution{font-size:10px;background:rgba(247,245,240,.82)!important}
  .leaflet-bar a{color:var(--ink)}
  .leaflet-control-layers{border-radius:12px!important;border:1px solid var(--hair)!important;
    box-shadow:var(--shadow)!important;font-family:Inter,sans-serif}

  #tilenote{display:none;position:absolute;z-index:880;
    left:14px;right:14px;top:calc(env(safe-area-inset-top) + 112px);
    background:var(--ink);color:var(--chalk);border-radius:10px;
    padding:9px 12px;font-size:12px;line-height:1.35;box-shadow:var(--shadow)}

  .locate{position:absolute;z-index:900;left:14px;
    bottom:calc(env(safe-area-inset-bottom) + 22px);
    width:46px;height:46px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--chalk);border:1px solid var(--hair);box-shadow:var(--shadow);
    cursor:pointer;color:var(--ink)}
  .locate:focus-visible{outline:2px solid var(--pine);outline-offset:2px}
  .locate.active{background:var(--pine);color:var(--chalk);border-color:var(--pine)}
  .locate.busy{animation:pulse 1.1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .me{width:16px;height:16px;border-radius:50%;background:#2563EB;
    border:3px solid #fff;box-shadow:0 0 0 2px rgba(37,99,235,.35),0 1px 4px rgba(0,0,0,.4)}
  #toast{display:none;position:absolute;z-index:960;left:14px;right:14px;
    bottom:calc(env(safe-area-inset-bottom) + 80px);
    background:var(--ink);color:var(--chalk);border-radius:10px;
    padding:10px 13px;font-size:12.5px;line-height:1.4;box-shadow:var(--shadow)}

  .grade-chip{display:inline-block;font-family:'Space Mono',monospace;font-weight:700;
    font-size:15px;color:#fff;padding:4px 11px;border-radius:8px;margin-bottom:10px}

  #legend{position:absolute;z-index:900;right:14px;
    top:calc(env(safe-area-inset-top) + 70px);
    background:var(--chalk);border:1px solid var(--hair);border-radius:12px;
    box-shadow:var(--shadow);overflow:hidden}
  #legToggle{all:unset;display:flex;align-items:center;gap:6px;cursor:pointer;
    padding:8px 12px;font-family:'Space Grotesk',sans-serif;font-weight:700;
    letter-spacing:.08em;font-size:12px;color:var(--ink)}
  #legToggle:focus-visible{outline:2px solid var(--pine);outline-offset:-2px}
  #legBody{margin:0;padding:2px 12px 10px;list-style:none}
  #legBody.collapsed{display:none}
  #legBody li{display:flex;align-items:center;gap:8px;padding:3px 0;
    font-family:'Space Mono',monospace;font-size:11.5px;color:var(--ink);white-space:nowrap}
  #legBody i{width:12px;height:12px;border-radius:50%;flex:0 0 auto}

  @media (prefers-reduced-motion: reduce){
    .sheet{transition:none}.chip{transition:none}.locate.busy{animation:none}
  }
</style>

// Si les tuiles sont bloquées (aperçu en bac à sable), on prévient au lieu de laisser un fond vide.
let tileWarned=false;
function tileFail(){ if(tileWarned) return; tileWarned=true;
  document.getElementById('tilenote').style.display='block'; }
[plan,minimal,relief].forEach(l=>l.on('tileerror',tileFail));

const cluster = L.markerClusterGroup({
  maxClusterRadius:35,
  disableClusteringAtZoom:15, // ↓ baisse ce nombre pour séparer les points plus tôt
  iconCreateFunction:c=>L.divIcon({
    html:`<div class="cluster">${c.getChildCount()}</div>`,
    className:'', iconSize:[38,38]})
});
map.addLayer(cluster);

const sheet=document.getElementById('sheet');
let userLatLng=null, meMarker=null, meCircle=null;
function haversine(la1,lo1,la2,lo2){
  const R=6371, r=Math.PI/180;
  const dLa=(la2-la1)*r, dLo=(lo2-lo1)*r;
  const a=Math.sin(dLa/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}
// Cotation française -> couleur (bandes définies par l'utilisateur)
const GRADE_BANDS=[{max:35,c:'#2FA84F'},{max:39,c:'#F2C200'},{max:43,c:'#EE7A21'},{max:47,c:'#E03131'}];
const GRADE_HARD='#8A3FCF', GRADE_NONE='#9A9186';
function gradeVal(g){
  if(!g) return null;
  const one=x=>{
    const m=String(x).trim().toLowerCase().match(/^(\d)\s*([abc])?\s*(\+)?/);
    if(!m) return null;
    return (+m[1])*6 + (m[2]?{a:0,b:1,c:2}[m[2]]:0)*2 + (m[3]?1:0);
  };
  const vals=String(g).split(/[-–—\/]|\.\./).map(s=>one(s)).filter(v=>v!=null);
  return vals.length ? Math.max(...vals) : null;   // fourchette -> on prend le plus dur
}
function gradeColor(g){
  const v=gradeVal(g);
  if(v==null) return GRADE_NONE;
  for(const b of GRADE_BANDS) if(v<=b.max) return b.c;
  return GRADE_HARD;
}
function openSheet(s){
  document.getElementById('s-name').textContent = s[2] || 'Site sans nom';
  const gc=document.getElementById('s-grade');
  if(s[6]){ gc.textContent=s[6]; gc.style.background=gradeColor(s[6]); gc.style.display='inline-block'; }
  else gc.style.display='none';
  const tags=document.getElementById('s-tags'); tags.innerHTML='';
  const style = s[4];
  if(style){ style.split(', ').forEach(t=>addTag(tags,t,false)); }
  addTag(tags, s[3] ? 'Salle' : 'Falaise', s[3]===1);
  document.getElementById('s-coord').textContent = `${s[0].toFixed(5)}, ${s[1].toFixed(5)}`;
  const topo=document.getElementById('s-topo');
  if(s[5]){ topo.href=s[5]; topo.classList.remove('hidden'); }
  else topo.classList.add('hidden');
  document.getElementById('s-osm').href=`https://www.openstreetmap.org/?mlat=${s[0]}&mlon=${s[1]}#map=17/${s[0]}/${s[1]}`;
  const dist=document.getElementById('s-dist');
  if(userLatLng){
    const km=haversine(userLatLng.lat,userLatLng.lng,s[0],s[1]);
    dist.textContent = km<1 ? `à ${Math.round(km*1000)} m à vol d'oiseau`
                            : `à ${km.toFixed(1).replace('.',',')} km à vol d'oiseau`;
  } else dist.textContent='';
  sheet.classList.add('open');
}
function addTag(box,txt,muted){
  const el=document.createElement('span');
  el.className='tag'+(muted?' muted':''); el.textContent=txt; box.appendChild(el);
}
map.on('click',()=>sheet.classList.remove('open'));

// --- Géolocalisation ---
const toastEl=document.getElementById('toast');
let toastT=null;
function toast(msg){ toastEl.textContent=msg; toastEl.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>toastEl.style.display='none',6000); }

const locateBtn=document.getElementById('locate');
locateBtn.addEventListener('click',()=>{
  if(!('geolocation' in navigator)){ toast("Géolocalisation non disponible sur cet appareil."); return; }
  locateBtn.classList.add('busy');
  map.locate({setView:false, enableHighAccuracy:true, timeout:10000, maximumAge:60000});
});
map.on('locationfound',e=>{
  locateBtn.classList.remove('busy'); locateBtn.classList.add('active');
  userLatLng=e.latlng;
  const icon=L.divIcon({html:'<div class="me"></div>',className:'',iconSize:[16,16],iconAnchor:[8,8]});
  if(meMarker) meMarker.setLatLng(e.latlng);
  else meMarker=L.marker(e.latlng,{icon,interactive:false,keyboard:false}).addTo(map);
  if(meCircle) meCircle.setLatLng(e.latlng).setRadius(e.accuracy);
  else meCircle=L.circle(e.latlng,{radius:e.accuracy,color:'#2563EB',weight:1,
        fillColor:'#2563EB',fillOpacity:0.12}).addTo(map);
  map.setView(e.latlng, Math.max(map.getZoom(),13));
});
map.on('locationerror',()=>{
  locateBtn.classList.remove('busy');
  toast("Position indisponible : autorise l'accès à ta position, et ouvre l'appli en https (l'aperçu et les fichiers locaux la bloquent).");
});

function render(){
  cluster.clearLayers();
  for(const s of SPOTS){
    const m=L.marker([s[0],s[1]],{icon:L.divIcon({
      html:`<div class="mk" style="background:${gradeColor(s[6])}"></div>`,
      className:'',
      iconSize:[14,14],iconAnchor:[7,7]}), keyboard:true, title:s[2]||''});
    m.on('click',e=>{L.DomEvent.stopPropagation(e);openSheet(s);});
    cluster.addLayer(m);
  }
  document.getElementById('count').textContent =
    `${SPOTS.length} spots · 3 h autour de Lyon`;
}

render();
